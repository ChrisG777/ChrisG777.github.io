<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Reading Notes Editor</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #f8fafc;
        color: #1e293b;
      }
      .layout {
        display: flex;
        height: 100vh;
      }
      .sidebar {
        width: 280px;
        background: #fff;
        border-right: 1px solid #e2e8f0;
        overflow-y: auto;
        padding: 1rem 0;
        flex-shrink: 0;
      }
      .sidebar h3 {
        padding: 0 1rem;
        margin-bottom: 0.5rem;
        font-size: 0.9rem;
        color: #64748b;
        text-transform: uppercase;
        letter-spacing: 0.05em;
      }
      .sidebar-item {
        display: block;
        padding: 0.5rem 1rem;
        text-decoration: none;
        color: #334155;
        font-size: 0.85rem;
        border-left: 3px solid transparent;
        cursor: pointer;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .sidebar-item:hover {
        background: #f1f5f9;
      }
      .sidebar-item.active {
        background: #eff6ff;
        border-left-color: #2563eb;
        color: #2563eb;
        font-weight: 600;
      }
      .sidebar-item.new {
        color: #2563eb;
        font-weight: 600;
      }
      .main {
        flex: 1;
        overflow-y: auto;
        padding: 2rem;
      }
      .header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 1rem;
      }
      .header h2 {
        font-size: 1.3rem;
      }
      .actions {
        display: flex;
        gap: 0.5rem;
        align-items: center;
      }
      .btn {
        padding: 0.4rem 1rem;
        border: 1px solid #e2e8f0;
        border-radius: 6px;
        background: #fff;
        font-size: 0.85rem;
        cursor: pointer;
        text-decoration: none;
        color: #334155;
      }
      .btn:hover {
        background: #f1f5f9;
      }
      .btn.save {
        background: #2563eb;
        color: #fff;
        border-color: #2563eb;
      }
      .btn.save:hover {
        background: #1d4ed8;
      }
      .btn.delete {
        color: #dc2626;
        border-color: #fecaca;
      }
      .btn.delete:hover {
        background: #fef2f2;
      }
      .btn.preview-toggle.active {
        background: #eff6ff;
        border-color: #2563eb;
        color: #2563eb;
      }
      .msg {
        padding: 0.5rem 0.75rem;
        margin-bottom: 1rem;
        border-radius: 6px;
        font-size: 0.85rem;
        background: #f0fdf4;
        color: #166534;
        border: 1px solid #bbf7d0;
      }
      .msg.err {
        background: #fef2f2;
        color: #991b1b;
        border-color: #fecaca;
      }
      .fields {
        display: flex;
        flex-direction: column;
        gap: 0.75rem;
        margin-bottom: 1rem;
      }
      .field label {
        display: block;
        font-size: 0.8rem;
        color: #64748b;
        margin-bottom: 0.25rem;
        font-weight: 500;
      }
      .field input[type="text"],
      .field input[type="date"] {
        width: 100%;
        padding: 0.4rem 0.6rem;
        border: 1px solid #e2e8f0;
        border-radius: 6px;
        font-size: 0.9rem;
        font-family: inherit;
      }
      .field input:focus {
        outline: none;
        border-color: #2563eb;
      }
      .row {
        display: flex;
        gap: 0.75rem;
      }
      .row .field {
        flex: 1;
      }
      .checkbox-field {
        display: flex;
        align-items: center;
        gap: 0.4rem;
        padding-top: 1.2rem;
      }
      .checkbox-field label {
        display: flex;
        align-items: center;
        gap: 0.4rem;
        font-size: 0.9rem;
        color: #334155;
      }
      .content-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 0.25rem;
      }
      .content-header label {
        font-size: 0.8rem;
        color: #64748b;
        font-weight: 500;
      }
      .editor-area {
        display: flex;
        gap: 1rem;
        height: calc(100vh - 420px);
        min-height: 200px;
      }
      textarea {
        flex: 1;
        padding: 0.75rem;
        border: 1px solid #e2e8f0;
        border-radius: 6px;
        font-family: "SF Mono", "Fira Code", monospace;
        font-size: 0.85rem;
        resize: none;
        line-height: 1.5;
      }
      textarea:focus {
        outline: none;
        border-color: #2563eb;
      }
      #preview-pane {
        flex: 1;
        padding: 0.75rem;
        border: 1px solid #e2e8f0;
        border-radius: 6px;
        overflow-y: auto;
        background: #fff;
        font-size: 0.9rem;
        line-height: 1.6;
        display: none;
      }
      #preview-pane img {
        max-width: 100%;
        border-radius: 4px;
      }
      #preview-pane h1,
      #preview-pane h2,
      #preview-pane h3 {
        margin: 1rem 0 0.5rem;
      }
      #preview-pane p {
        margin: 0.5rem 0;
      }
      #preview-pane pre {
        background: #f1f5f9;
        padding: 0.75rem;
        border-radius: 4px;
        overflow-x: auto;
      }
      #preview-pane code {
        font-family: "SF Mono", "Fira Code", monospace;
        font-size: 0.85rem;
      }
      #preview-pane blockquote {
        border-left: 3px solid #e2e8f0;
        padding-left: 0.75rem;
        color: #64748b;
      }
      #preview-pane ul,
      #preview-pane ol {
        padding-left: 1.5rem;
        margin: 0.5rem 0;
      }
      .kbd {
        font-size: 0.7rem;
        color: #94a3b8;
        margin-left: 0.25rem;
      }
    </style>
  </head>
  <body>
    <div class="layout">
      <aside class="sidebar" id="sidebar">
        <h3>Reading Notes</h3>
        <div class="sidebar-item new" onclick="newPost()">+ New</div>
      </aside>
      <div class="main">
        <div class="header">
          <h2 id="heading">New Reading Note</h2>
          <div class="actions">
            <button class="btn save" onclick="save()">Save <span class="kbd">&thinsp;&#8984;S</span></button>
            <a class="btn" id="previewSiteBtn" href="#" target="_blank" style="display: none">View in Site</a>
            <button class="btn delete" id="deleteBtn" onclick="deletePost()" style="display: none">Delete</button>
          </div>
        </div>
        <div id="msg"></div>
        <div class="fields">
          <div class="field">
            <label>Paper Title</label>
            <input type="text" id="f-title" placeholder="Full paper title" />
          </div>
          <div class="field">
            <label>Summary Title (subtitle)</label>
            <input type="text" id="f-summary" placeholder="Short name / authors" />
          </div>
          <div class="row">
            <div class="field">
              <label>Paper Date</label>
              <input type="text" id="f-paperDate" placeholder="2025-06-12" />
            </div>
            <div class="field">
              <label>Date Read</label>
              <input type="text" id="f-dateRead" placeholder="2025-11-04" />
            </div>
          </div>
          <div class="field">
            <label>Paper URL</label>
            <input type="text" id="f-url" placeholder="https://arxiv.org/abs/..." />
          </div>
          <div class="row">
            <div class="field">
              <label>Institutions (comma-separated)</label>
              <input type="text" id="f-institutions" placeholder="MIT, Anthropic" />
            </div>
            <div class="field">
              <label>Tags (comma-separated)</label>
              <input type="text" id="f-tags" placeholder="transformers, rl" />
            </div>
          </div>
          <div class="row">
            <div class="field" id="slugField">
              <label>Slug (auto from title if empty)</label>
              <input type="text" id="f-slug" placeholder="my-paper-slug" />
            </div>
            <div class="field checkbox-field">
              <label><input type="checkbox" id="f-readInFull" checked /> Read in full</label>
            </div>
          </div>
        </div>
        <div class="content-header">
          <label>Notes (Markdown) &mdash; paste images directly</label>
          <div class="actions">
            <button class="btn preview-toggle" id="previewToggle" onclick="togglePreview()">Preview</button>
            <button class="btn" onclick="document.getElementById('fileInput').click()">Upload Image</button>
            <input type="file" id="fileInput" accept="image/*" multiple style="display: none" onchange="handleFileUpload(event)" />
          </div>
        </div>
        <div class="editor-area">
          <textarea
            id="f-content"
            placeholder="Write your notes in markdown... (paste images with Ctrl/Cmd+V)"
            onpaste="handlePaste(event)"
          ></textarea>
          <div id="preview-pane"></div>
        </div>
      </div>
    </div>
    <script>
      var currentSlug = null;
      var posts = [];
      var previewVisible = false;
      var previewDebounce = null;

      function $(id) {
        return document.getElementById(id);
      }

      function genSlug(title) {
        return title
          .toLowerCase()
          .replace(/[^a-z0-9\s-]/g, " ")
          .replace(/\s+/g, "-")
          .replace(/-+/g, "-")
          .replace(/^-|-$/g, "")
          .substring(0, 80);
      }

      function showMsg(text, err) {
        var el = $("msg");
        el.innerHTML = '<div class="msg' + (err ? " err" : "") + '">' + text + "</div>";
        setTimeout(function () {
          el.innerHTML = "";
        }, 3000);
      }

      function loadList() {
        fetch("/api/list")
          .then(function (r) {
            return r.json();
          })
          .then(function (data) {
            posts = data;
            var html = '<h3>Reading Notes</h3><div class="sidebar-item new" onclick="newPost()">+ New</div>';
            data.forEach(function (p) {
              var cls = "sidebar-item" + (p.slug === currentSlug ? " active" : "");
              html +=
                '<div class="' +
                cls +
                '" onclick="loadPost(\'' +
                p.slug.replace(/'/g, "\\'") +
                '\')" title="' +
                (p.title || "").replace(/"/g, "&quot;") +
                '">' +
                (p.summaryTitle || p.title) +
                "</div>";
            });
            $("sidebar").innerHTML = html;
          });
      }

      function newPost() {
        currentSlug = null;
        $("heading").textContent = "New Reading Note";
        $("f-title").value = "";
        $("f-summary").value = "";
        $("f-paperDate").value = "";
        $("f-dateRead").value = "";
        $("f-url").value = "";
        $("f-institutions").value = "";
        $("f-tags").value = "";
        $("f-readInFull").checked = true;
        $("f-slug").value = "";
        $("f-content").value = "";
        $("slugField").style.display = "";
        $("deleteBtn").style.display = "none";
        $("previewSiteBtn").style.display = "none";
        updatePreview();
        loadList();
      }

      function loadPost(slug) {
        fetch("/api/get/" + slug)
          .then(function (r) {
            return r.json();
          })
          .then(function (data) {
            currentSlug = slug;
            $("heading").textContent = "Edit: " + (data.summaryTitle || data.title);
            $("f-title").value = data.title || "";
            $("f-summary").value = data.summaryTitle || "";
            $("f-paperDate").value = data.paperDate || "";
            $("f-dateRead").value = data.dateRead || "";
            $("f-url").value = data.paperUrl || "";
            $("f-institutions").value = (data.institutions || []).join(", ");
            $("f-tags").value = (data.tags || []).join(", ");
            $("f-readInFull").checked = data.readInFull !== false;
            $("f-slug").value = slug;
            $("f-content").value = data.content || "";
            $("slugField").style.display = "";
            $("deleteBtn").style.display = "";
            updateSitePreviewLink();
            updatePreview();
            loadList();
          });
      }

      function save() {
        var slug = currentSlug || $("f-slug").value || genSlug($("f-title").value);
        if (!slug) {
          showMsg("Title or slug required", true);
          return;
        }
        var body = {
          slug: slug,
          title: $("f-title").value,
          summaryTitle: $("f-summary").value || $("f-title").value,
          paperDate: $("f-paperDate").value,
          dateRead: $("f-dateRead").value,
          paperUrl: $("f-url").value,
          institutions: $("f-institutions")
            .value.split(",")
            .map(function (s) {
              return s.trim();
            })
            .filter(Boolean),
          readInFull: $("f-readInFull").checked,
          tags: $("f-tags")
            .value.split(",")
            .map(function (s) {
              return s.trim();
            })
            .filter(Boolean),
          content: $("f-content").value,
        };
        fetch("/api/save", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(body),
        })
          .then(function (r) {
            return r.json();
          })
          .then(function (data) {
            if (data.ok) {
              showMsg("Saved!");
              currentSlug = slug;
              $("deleteBtn").style.display = "";
              updateSitePreviewLink();
              loadList();
            } else {
              showMsg("Error: " + (data.error || "unknown"), true);
            }
          })
          .catch(function (e) {
            showMsg("Error: " + e.message, true);
          });
      }

      function deletePost() {
        if (!currentSlug) return;
        if (!confirm('Delete "' + ($("f-title").value || currentSlug) + '"?')) return;
        fetch("/api/delete", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ slug: currentSlug }),
        })
          .then(function (r) {
            return r.json();
          })
          .then(function (data) {
            if (data.ok) newPost();
          });
      }

      function insertImage(filename, slug) {
        var ta = $("f-content");
        var pos = ta.selectionStart || ta.value.length;
        var before = ta.value.slice(0, pos);
        var after = ta.value.slice(pos);
        ta.value = before + "![](/assets/img/distillations/" + slug + "/" + filename + ")" + after;
        showMsg("Image uploaded: " + filename);
        updatePreview();
      }

      function uploadFile(file) {
        var slug = currentSlug || $("f-slug").value || genSlug($("f-title").value);
        if (!slug) {
          showMsg("Set a title before uploading images", true);
          return;
        }
        var reader = new FileReader();
        reader.onload = function () {
          var b64 = reader.result.split(",")[1];
          var ext = file.name.split(".").pop().toLowerCase() || "png";
          if (ext === "blob" || ext === file.name) ext = "png";
          var filename = "img-" + Date.now() + "." + ext;
          fetch("/api/upload-image", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ slug: slug, filename: filename, data: b64 }),
          })
            .then(function (r) {
              return r.json();
            })
            .then(function (data) {
              if (data.ok) insertImage(filename, slug);
            });
        };
        reader.readAsDataURL(file);
      }

      function handleFileUpload(e) {
        Array.from(e.target.files).forEach(function (f) {
          if (f.type.startsWith("image/")) uploadFile(f);
        });
        e.target.value = "";
      }

      function handlePaste(e) {
        var items = (e.clipboardData || {}).items;
        if (!items) return;
        for (var i = 0; i < items.length; i++) {
          if (items[i].type.startsWith("image/")) {
            e.preventDefault();
            uploadFile(items[i].getAsFile());
            break;
          }
        }
      }

      /* --- Markdown preview --- */

      function togglePreview() {
        previewVisible = !previewVisible;
        $("preview-pane").style.display = previewVisible ? "block" : "none";
        $("previewToggle").classList.toggle("active", previewVisible);
        if (previewVisible) updatePreview();
      }

      function updatePreview() {
        if (!previewVisible) return;
        var md = $("f-content").value;
        /* Rewrite local image paths to point at the Jekyll dev server */
        md = md.replace(/!\[([^\]]*)\]\(\/assets\//g, "![$1](http://localhost:8080/assets/");
        $("preview-pane").innerHTML = marked.parse(md);
      }

      $("f-content").addEventListener("input", function () {
        clearTimeout(previewDebounce);
        previewDebounce = setTimeout(updatePreview, 150);
      });

      /* --- Preview in site link --- */

      function updateSitePreviewLink() {
        var slug = currentSlug || $("f-slug").value;
        var date = $("f-dateRead").value;
        var btn = $("previewSiteBtn");
        if (slug && date) {
          var year = date.split("-")[0];
          btn.href = "http://localhost:8080/blog/" + year + "/" + slug + "/";
          btn.style.display = "";
        } else {
          btn.style.display = "none";
        }
      }

      /* --- Keyboard shortcuts --- */

      document.addEventListener("keydown", function (e) {
        if ((e.ctrlKey || e.metaKey) && e.key === "s") {
          e.preventDefault();
          save();
        }
      });

      loadList();
    </script>
  </body>
</html>
